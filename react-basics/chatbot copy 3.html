<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script> 
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      // 1. INPUT COMPONENT
      function ChatInput({ onSendMessage }) {
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event) {
          setInputText(event.target.value);  
        }

        function handleSend() {
          if (inputText.trim() === '') return; // Prevent sending empty messages
          onSendMessage(inputText);            // Pass the typed text to App state
          setInputText('');                    // Clear the input field text
        }

        return (
          <>
            <input  
              placeholder="Send input to chatbot" 
              size="30"
              value={inputText}                // Controlled input element
              onChange={saveInputText}  
            />
            <button onClick={handleSend}>Send Message</button>
          </>
        );
      }

      // 2. INDIVIDUAL MESSAGE COMPONENT
      function ChatMsg({ msg, sender }) {
        return (
          <div>
            {sender === "robot" && <img src={sender + ".png"} width="50" alt="robot" />}
            {msg}
            {sender === "user" && <img src={sender + ".png"} width="50" alt="user" />}
          </div>
        );
      }

      // 3. MESSAGE LIST DISPLAY COMPONENT
      function ChatMessages({ messages }) {
        return (
          <>
            {messages.map((chatMessage) => {
              return (
                <ChatMsg 
                  key={chatMessage.id}
                  msg={chatMessage.msg} 
                  sender={chatMessage.sender} 
                />
              );
            })}
          </>
        );
      }

      // 4. MAIN APP COMPONENT (Holds the Shared State)
      function App() {
        const [cht, setCht] = React.useState([
          {
            msg: "Hello Chat.", 
            sender: "user",
            id: 1
          },
          {
            msg: "Hello User. How can I help you?", 
            sender: "robot",
            id: 2
          }
        ]);

        function sendMessage(text) {
          // FIX: Generate the chatbot response immediately upon clicking the button
          const robotResponse = Chatbot.getResponse(text);

          setCht([
            ...cht,
            {
              msg: text,                       // User's message
              sender: 'user',
              id: crypto.randomUUID()
            },
            {
              msg: robotResponse,              // Robot's response
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);
        }

        return (
          <>
            <ChatInput onSendMessage={sendMessage} /> 
            <ChatMessages messages={cht} />
          </>
        );
      }
      
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
