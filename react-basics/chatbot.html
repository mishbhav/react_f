<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
      body{
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-button {
        background-color:  rgb(25, 135,84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer   ;
      }
      .chat-input {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }
      
      .chat-msg-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .chat-msg-user{
        display: flex; 
        justify-content: end;
        align-items: start;
      }
      .chat-msg-robot{
        display: flex;
        justify-content:left;
        align-items: start;
      }
      .msg-text{
        background-color: rgb(238,238,238);
        padding: 150x 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .user-profile{
        width: 45px;
      }
      .robot-profile{
        width: 45px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script> 
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      // 1. INPUT COMPONENT
      function ChatInput({ onSendMessage }) {
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event) {
          setInputText(event.target.value);  
        }

        function handleSend() {
          if (inputText.trim() === '') return; // Prevent sending empty messages
          onSendMessage(inputText);            // Pass the typed text to App state
          setInputText('');                    // Clear the input field text
        }

        return (
          <div className="chat-input-container">
            <input  
              placeholder="Send input to chatbot" 
              size="30"
              value={inputText}                // Controlled input element
              onChange={saveInputText} 
              className="chat-input" 
            />
            <button onClick={handleSend} className="send-button">Send Message</button>
          </div>
        );
      }

      // 2. INDIVIDUAL MESSAGE COMPONENT
      function ChatMsg({ msg, sender }) {
        return (
          <div  className={sender==='user'?'chat-msg-user':'chat-msg-robot'}>
            {sender === "robot" && <img src={sender + ".png"} className="robot-profile" alt="robot" />}
            <div className="msg-text">
              {msg}
            </div>
            {sender === "user" && <img src={sender + ".png"}  className="user-profile" alt="user" />}
          </div>
        );
      }

      // 3. MESSAGE LIST DISPLAY COMPONENT
      function ChatMessages({ messages }) {
        const chatMsgRef=React.useRef(null);

        React.useEffect(() => {
          const containerElem = chatMsgRef.current;
          if(containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [messages]);
        return (
          <div className="chat-msg-container"
            ref={chatMsgRef}>
            {messages.map((chatMessage) => {
              return (
                <ChatMsg 
                  key={chatMessage.id}
                  msg={chatMessage.msg} 
                  sender={chatMessage.sender} 
                />
              );
            })}
          </div>
        );
      }

      // 4. MAIN APP COMPONENT (Holds the Shared State)
      function App() {
        const [cht, setCht] = React.useState([
          {
            msg: "Hello Chat.", 
            sender: "user",
            id: 1
          },
          {
            msg: "Hello User. How can I help you?", 
            sender: "robot",
            id: 2
          }
        ]);

        function sendMessage(text) {
          // FIX: Generate the chatbot response immediately upon clicking the button
          const robotResponse = Chatbot.getResponse(text);

          setCht([
            ...cht,
            {
              msg: text,                       // User's message
              sender: 'user',
              id: crypto.randomUUID()
            },
            {
              msg: robotResponse,              // Robot's response
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);
        }

        return (
          <div className="app-container">
            <ChatMessages messages={cht} />
            <ChatInput onSendMessage={sendMessage} /> 
          </div>
        );
      }
      
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
