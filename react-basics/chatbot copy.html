<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
        console.log(dayjs().format('MMMM D'));

        function ChatInput(){
          return (
            <>
              <input  
                placeholder="Send input to chatbot" 
                size="30" 
              />
              <button>Send</button>
            </>
          );
        }
        function ChatMsg({msg, sender}){

          return (
            <div>
              {sender === "robot" && <img src={sender +".png"} width="50"/>}
              {msg}
              {sender === "user" && <img src={sender +".png"} width="50"/>}
            </div>
          );
        }

        function App(){
          
          return (
            <>
              <ChatInput /> 
              <ChatMsg 
                msg="Hello Chat." 
                sender="user"
              />
              <ChatMsg 
                msg="Hello User. How can I help you?" 
                sender="robot"
              />
            </>
        );
        }
        
      const container = document.querySelector('.js-container');
      const root =ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
